<div class="min-h-screen bg-pureWhite pt-24 pb-12 px-6">
  <div class="max-w-4xl mx-auto">
    <header class="mb-12">
      <h1 class="text-4xl md:text-5xl font-outfit font-bold text-absoluteDark mb-4">Blog</h1>
      <p class="text-lg text-gray-600 font-inter">Kabar terbaru, artikel teknis, dan wawasan dari Minimalism AI.</p>
    </header>

    <div class="grid gap-8">
      <article *ngFor="let post of posts" class="border border-gray-200 rounded-xl p-6 hover:shadow-lg transition-shadow bg-white">
        <span class="text-sm font-fira text-gray-500 block mb-2">{{ post.date }}</span>
        <h2 class="text-2xl font-bold font-inter text-absoluteDark mb-3">
          <a [routerLink]="['/blog', post.slug]" class="hover:text-blue-600 transition-colors">{{ post.title }}</a>
        </h2>
        <p class="text-gray-600 mb-4">{{ post.description }}</p>
        <a [routerLink]="['/blog', post.slug]" class="text-blue-600 font-medium hover:underline inline-flex items-center">
          Baca selengkapnya
          <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </a>
      </article>
    </div>
  </div>
</div>
