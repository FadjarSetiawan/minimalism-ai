<div class="min-h-screen bg-pureWhite pt-24 pb-12 px-6">
  <div class="max-w-3xl mx-auto">
    
    <a routerLink="/blog" class="inline-flex items-center text-gray-500 hover:text-absoluteDark mb-8 transition-colors font-inter">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Kembali ke Blog
    </a>

    <article *ngIf="post; else notFound">
      <header class="mb-10">
        <span class="text-gray-500 font-fira block mb-3">{{ post.date }}</span>
        <h1 class="text-4xl md:text-5xl font-outfit font-bold text-absoluteDark leading-tight mb-6">{{ post.title }}</h1>
        <div class="w-20 h-1 bg-absoluteDark rounded"></div>
      </header>
      
      <div class="prose prose-lg max-w-none text-gray-800 font-inter leading-relaxed" [innerHTML]="post.content">
      </div>
    </article>

    <ng-template #notFound>
      <div class="text-center py-20">
        <h2 class="text-3xl font-bold font-outfit text-absoluteDark mb-4">Artikel Tidak Ditemukan</h2>
        <p class="text-gray-600 mb-8">Maaf, artikel yang Anda cari tidak ada atau telah dihapus.</p>
        <a routerLink="/blog" class="bg-absoluteDark text-pureWhite px-6 py-3 rounded-md hover:bg-gray-800 transition-colors font-medium">Lihat Semua Artikel</a>
      </div>
    </ng-template>

  </div>
</div>
